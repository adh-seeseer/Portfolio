<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="img/logo.png" type="image/png"/>
<link href="https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<title>Gallery — Shishir Adhikari</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#f4f7ff;color:#1a2340;line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
ul{list-style:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#f4f7ff}
::-webkit-scrollbar-thumb{background:#1a6bff;border-radius:3px}
:root{
  --blue:#1a6bff;--navy:#0c1e4a;--white:#ffffff;--bg:#f4f7ff;--bg2:#ffffff;
  --muted:#5a6a8a;--blue-glass:rgba(26,107,255,.07);--blue-border:rgba(26,107,255,.18);
  --blue-light:#e8efff;--g-blue:linear-gradient(135deg,#1a6bff 0%,#4a8fff 100%);
  --g-hero:linear-gradient(160deg,#eef3ff 0%,#f8faff 60%,#e8f0ff 100%);
  --g-card:linear-gradient(145deg,rgba(255,255,255,.95) 0%,rgba(236,244,255,.7) 100%);
  --s-card:0 4px 24px rgba(26,107,255,.08),0 1px 4px rgba(0,0,0,.04);
  --s-hover:0 12px 40px rgba(26,107,255,.16),0 2px 8px rgba(0,0,0,.06);
  --hh:68px;--mw:1160px;--r:16px;--r-sm:10px;--r-xs:7px;
  --t:.26s cubic-bezier(.4,0,.2,1)
}
.wrap{max-width:var(--mw);margin:0 auto;padding:0 3rem}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.6rem;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;border-radius:var(--r-xs);border:none;cursor:pointer;transition:all var(--t);text-decoration:none}
.btn-primary{background:var(--g-blue);color:#fff;box-shadow:0 4px 14px rgba(26,107,255,.28)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,107,255,.38)}
.btn-outline{background:transparent;color:var(--blue);border:1.5px solid var(--blue-border)}
.btn-outline:hover{background:var(--blue-glass);border-color:var(--blue);transform:translateY(-2px)}

/* Header */
.l-header{position:fixed;inset:0 0 auto;height:var(--hh);z-index:1000;background:rgba(248,250,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(26,107,255,.1);transition:box-shadow var(--t)}
.l-header.scrolled{box-shadow:0 4px 20px rgba(26,107,255,.1)}
.nav{height:var(--hh);display:flex;align-items:center;justify-content:space-between;gap:2rem}
.nav-logo{display:flex;align-items:center;gap:.6rem;transition:opacity var(--t)}
.nav-logo:hover{opacity:.75}
.nav-logo img{width:36px;height:36px;border-radius:50%;border:2px solid var(--blue-border)}
.nav-logo-name{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--navy)}
.nav-links{display:flex;align-items:center;gap:.2rem}
.nav-link{font-size:.83rem;font-weight:500;color:var(--muted);padding:.4rem .85rem;border-radius:var(--r-xs);transition:all var(--t)}
.nav-link:hover,.nav-link.active{color:var(--blue);background:var(--blue-glass)}
.nav-cta{font-size:.83rem;font-weight:600;color:#fff;background:var(--g-blue);padding:.44rem 1.1rem;border-radius:var(--r-xs);transition:all var(--t);box-shadow:0 2px 10px rgba(26,107,255,.25)}
.nav-cta:hover{box-shadow:0 4px 16px rgba(26,107,255,.38);transform:translateY(-1px)}
.nav-toggle{display:none;font-size:1.5rem;color:var(--navy);cursor:pointer;padding:.3rem}
.nav-menu{display:flex;align-items:center;gap:1.5rem}

/* Gallery hero */
.g-hero{padding:calc(var(--hh) + 4rem) 0 3rem;background:var(--g-hero);text-align:center}
.g-hero-back{display:inline-flex;align-items:center;gap:.4rem;font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color var(--t);margin-bottom:1.25rem}
.g-hero-back:hover{color:var(--blue)}
.sec-label{display:inline-block;font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);background:var(--blue-glass);border:1px solid var(--blue-border);border-radius:99px;padding:.32rem .9rem;margin-bottom:.9rem}
.sec-title{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,2.4vw,2.4rem);font-weight:800;color:var(--navy);letter-spacing:-.01em;line-height:1.2}
.sec-title em{font-style:normal;color:var(--blue)}
.g-hero-quote{font-size:.85rem;font-style:italic;color:var(--muted);margin-top:.6rem}

/* Gallery grid */
.g-section{background:var(--bg2);padding:64px 0}
.g-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.1rem}
.g-card{display:block;border-radius:var(--r-sm);overflow:hidden;background:var(--white);border:1px solid var(--blue-border);box-shadow:var(--s-card);transition:all var(--t);position:relative}
.g-card:hover{transform:translateY(-5px);box-shadow:var(--s-hover);border-color:var(--blue)}
.g-card img{width:100%;height:180px;object-fit:cover;display:block;transition:all var(--t)}
.g-card:hover img{transform:scale(1.05);filter:brightness(.7)}
.g-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--t)}
.g-card:hover .g-overlay{opacity:1}
.g-icon{width:40px;height:40px;background:var(--g-blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 4px 16px rgba(26,107,255,.4)}

/* Footer CTA */
.g-footer{background:linear-gradient(180deg,#f4f7ff 0%,#eef3ff 100%);padding:3rem 0;text-align:center}

/* Footer */
.footer{background:var(--navy);color:rgba(255,255,255,.55);padding:2.5rem 0}
.footer-inner{display:flex;flex-direction:column;align-items:center;gap:1.25rem;text-align:center}
.footer-brand{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;color:#fff}
.footer-social{display:flex;gap:.75rem}
.footer-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.12);border-radius:var(--r-xs);color:rgba(255,255,255,.5);font-size:1rem;transition:all var(--t)}
.footer-icon:hover{border-color:rgba(26,107,255,.6);color:#fff;background:rgba(26,107,255,.2)}
.footer-copy{font-size:.78rem}

@media(max-width:960px){
  .wrap{padding:0 1.5rem}
  .nav-links,.nav-cta{display:none}
  .nav-toggle{display:block}
  .nav-menu{position:fixed;top:var(--hh);right:-100%;width:260px;height:100vh;background:rgba(248,250,255,.98);backdrop-filter:blur(20px);border-left:1px solid var(--blue-border);padding:2rem 1.5rem;transition:right var(--t);z-index:999;flex-direction:column;align-items:flex-start;gap:0}
  .nav-menu.open{right:0}
  .nav-menu .nav-links{display:flex;flex-direction:column;gap:.2rem;width:100%}
  .nav-menu .nav-cta{display:inline-flex;margin-top:1rem}
  .g-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .g-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="l-header" id="hdr">
  <nav class="nav wrap">
    <a href="index.html" class="nav-logo">
      <img src="img/logo.png" alt="Logo"/>
      <span class="nav-logo-name">Shishir</span>
    </a>
    <div class="nav-menu" id="nav-menu">
      <ul class="nav-links">
        <li><a href="index.html#home"    class="nav-link">Home</a></li>

        <li><a href="index.html#skills"  class="nav-link">Skills</a></li>
        <li><a href="index.html#work"    class="nav-link active">Work</a></li>
        <li><a href="index.html#contact" class="nav-link">Contact</a></li>

      <a href="index.html#contact" class="nav-cta">Let's Talk</a>

</header>

<div class="g-hero">

  <div class="wrap">

      <a href="img/1.png"            class="g-card"><img src="img/1.png"            alt="1"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
      <a href="img/2.png"            class="g-card"><img src="img/2.png"            alt="2"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
      <a href="img/3.png"            class="g-card"><img src="img/3.png"            alt="3"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
      <a href="img/4.png"            class="g-card"><img src="img/4.png"            alt="4"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
      <a href="img/5.png"            class="g-card"><img src="img/5.png"            alt="5"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
      <a href="img/6.png"            class="g-card"><img src="img/6.png"            alt="6"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
      <a href="img/q1.png"           class="g-card"><img src="img/q1.png"           alt="Q1"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
      <a href="img/q2.png"           class="g-card"><img src="img/q2.png"           alt="Q2"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
      <a href="img/announcement.png" class="g-card"><img src="img/announcement.png" alt="Announcement"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
      <a href="img/pos.png"          class="g-card"><img src="img/pos.png"          alt="Poster"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>

      <a href="img/countdown.png"    class="g-card"><img src="img/countdown.png"    alt="Countdown"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
      <a href="img/ghoda.png"        class="g-card"><img src="img/ghoda.png"        alt="Ghoda"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>

      <a href="img/giveaway.png"     class="g-card"><img src="img/giveaway.png"     alt="Giveaway"/><div class="g-overlay"><div class="g-icon"><i class="bx bx-expand-alt"></i></div></div></a>
    </div>
  </div>
</section>

<div class="g-footer">

</div>

<footer class="footer">

    <div class="footer-inner">
      <span class="footer-brand">Shishir Adhikari</span>

        <a href="https://www.instagram.com/shishir_fx/" class="footer-icon" target="_blank"><i class="bx bxl-instagram"></i></a>

        <a href="https://www.linkedin.com/in/shishir-adh/" class="footer-icon" target="_blank"><i class="bx bxl-linkedin"></i></a>
      </div>
      <p class="footer-copy">&copy; 2025 Shishir Adhikari. All rights reserved.</p>
    </div>

</footer>

<script src="https://unpkg.com/scrollreveal"></script>
<script>
const tog=document.getElementById('nav-toggle'),mn=document.getElementById('nav-menu');
tog?.addEventListener('click',()=>{const o=mn.classList.toggle('open');tog.querySelector('i').className=o?'bx bx-x':'bx bx-menu';});
document.querySelectorAll('.nav-link,.nav-cta').forEach(el=>el.addEventListener('click',()=>{mn.classList.remove('open');const ic=tog?.querySelector('i');if(ic)ic.className='bx bx-menu';}));
const hdr=document.getElementById('hdr');
window.addEventListener('scroll',()=>hdr?.classList.toggle('scrolled',scrollY>30),{passive:true});
if(typeof ScrollReveal!=='undefined'){
  ScrollReveal({distance:'24px',duration:600,easing:'cubic-bezier(.4,0,.2,1)',reset:false})
    .reveal('.g-card',{origin:'bottom',interval:45,delay:30});
}
</script>
